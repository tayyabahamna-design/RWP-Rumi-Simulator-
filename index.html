<style>
  :root{
    --bg:#0B0F2A; --card:#141B3D; --card2:#1A2247; --border:rgba(255,255,255,0.08);
    --pink:#E6A8F0; --purple:#A78BFA; --text:#F2F0FA; --subtext:#9AA3C7;
    --wa-bg:#0B0F10; --wa-header:#171B1C; --wa-incoming:#1F2426; --wa-outgoing:#0B4A3B;
    --wa-text:#ECEFF0; --wa-subtext:#8A9296; --wa-accent:#25D366; --wa-link:#4FC3F7;
  }
  * { box-sizing: border-box; }
  body { font-family:'Segoe UI', system-ui, -apple-system, Arial, sans-serif; background:var(--bg); }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius:999px; }
  .hidden { display:none !important; }
  @keyframes fadeUp { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .fade-up { animation: fadeUp .3s ease-out; }
  @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:.5;} 30%{transform:translateY(-4px);opacity:1;} }
  .typing-dot { animation: typingDot 1.1s infinite ease-in-out; }
  @keyframes pulseRing { 0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.45);} 50%{box-shadow:0 0 0 10px rgba(37,211,102,0);} }
  .pulse-ring { animation: pulseRing 2.2s infinite; }
  @keyframes travel { from{transform:translateX(-40px);opacity:0;} 20%{opacity:1;} to{transform:translateX(220px);opacity:0;} }
  .travel-dot { animation: travel 1.4s ease-in-out forwards; }
  .voice-bar-fill { width:0%; }
  .menu-card { transition: transform .15s ease, border-color .15s ease; }
  .menu-card:hover { transform: translateY(-2px); border-color: var(--purple); }
  .stat-bump { animation: bump .4s ease; }
  @keyframes bump { 40%{ transform:scale(1.05); box-shadow:0 0 0 3px rgba(167,139,250,.3);} 100%{transform:scale(1);} }
  .sheet-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:flex-end; z-index:30; }
  .sheet-panel { width:100%; background:#1c1c1e; border-radius:20px 20px 0 0; padding:10px 16px 16px; max-height:92%; overflow-y:auto; }
  .sheet-grabber { width:36px; height:4px; border-radius:4px; background:#48484a; margin:0 auto 10px; }
  .sheet-row { display:flex; align-items:center; justify-content:space-between; padding:13px 2px; border-bottom:1px solid rgba(255,255,255,0.08); cursor:pointer; }
  .sheet-row:last-child { border-bottom:none; }
  .sheet-list { background:#2c2c2e; border-radius:12px; padding:0 12px; margin-top:14px; }
  .sheet-btn { width:100%; padding:13px; border-radius:12px; text-align:center; font-weight:700; font-size:14px; margin-top:16px; }
</style>

function renderMenu(){
  const list = document.getElementById("menu-list");
  list.innerHTML = MENU.map(m => `
    <button data-open="${m.n}" class="menu-card fade-up flex items-center gap-4 text-left rounded-2xl p-4" style="background:var(--card); border:1px solid var(--border);">
      <div class="flex items-center justify-center rounded-xl flex-shrink-0" style="width:44px;height:44px;background:var(--card2); font-size:20px;">${m.icon}</div>
      <div class="flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          <p class="font-bold text-sm" style="color:var(--text);">${m.n}. ${m.title}</p>
          <span class="text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:${m.tag==='SIMULATION' ? 'rgba(167,139,250,0.18)' : 'rgba(230,168,240,0.15)'}; color:${m.tag==='SIMULATION' ? 'var(--purple)' : 'var(--pink)'};">${m.tag}</span>
        </div>
        <p class="text-xs mt-0.5" style="color:var(--subtext);">${m.desc}</p>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--subtext)" stroke-width="2.4"><path d="m9 18 6-6-6-6"/></svg>
    </button>`).join("");
}
renderMenu();

document.getElementById("menu-list").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-open]");
  if (!btn) return;
  openModule(parseInt(btn.getAttribute("data-open"), 10));
});
document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("view-module").classList.add("hidden");
  document.getElementById("view-menu").classList.remove("hidden");
});

document.getElementById("restart-btn").addEventListener("click", () => {
  if (currentModuleN) openModule(currentModuleN);
});

let currentModuleN = null;

function openModule(n){
  currentModuleN = n;
  document.getElementById("view-menu").classList.add("hidden");
  const mv = document.getElementById("view-module");
  mv.classList.remove("hidden");
  const mc = document.getElementById("module-content");
  if (n === 1) { mc.innerHTML = renderProblemSolution(); initProblemSolutionModule(); }
  if (n === 2) { mc.innerHTML = renderDeoModule(); initDeoModule(); }
  if (n === 3) { mc.innerHTML = renderAeoVisitModule(); initAeoVisitModule(); }
  if (n === 4) { mc.innerHTML = renderAeoTrainingModule(); initAeoTrainingModule(); }
  if (n === 5) { mc.innerHTML = renderAeoMentorModule(); initAeoMentorModule(); }
  if (n === 6) { mc.innerHTML = renderLessonPlanModule(); initLessonPlanModule(); }
  if (n === 7) { mc.innerHTML = renderCoachModule(); initCoachModule(); }
  if (n === 8) { mc.innerHTML = renderStorybookModule(); initStorybookModule(); }
  if (n === 9) { mc.innerHTML = renderTrainingModule(); initTrainingModule(); }
  if (n === 10) { mc.innerHTML = renderPhonicsModule(); initPhonicsModule(); }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* =====================================================================
   MODULE 1 — THE PROBLEM → THE SOLUTION (merged, minimal text)
===================================================================== */
const BEFORE_CHIPS = [
  { icon:"📋", label:"Paperwork" },
  { icon:"👁️", label:"No Visibility" },
  { icon:"❓", label:"No Proof" },
];

function renderProblemSolution(){
  return `
  <div class="max-w-3xl mx-auto text-center">
    <p class="text-xs font-bold tracking-wide" style="color:var(--pink);">STEP 1 · THE STORY</p>
    <h2 class="text-2xl font-extrabold mt-1 mb-6" style="color:var(--text);">From Chaos → One Record</h2>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <div class="flex gap-2">
        ${BEFORE_CHIPS.map(c => `
          <div class="rounded-xl px-3 py-3 flex flex-col items-center gap-1" style="background:var(--card); border:1px solid var(--border); width:88px;">
            <span style="font-size:24px;">${c.icon}</span>
            <span class="text-[10.5px] font-semibold" style="color:var(--subtext);">${c.label}</span>
          </div>`).join("")}
      </div>

      <div class="flex flex-col items-center gap-1 px-2">
        <button id="run-solution" class="flex items-center justify-center rounded-full pulse-ring" style="width:46px; height:46px; background:#7BE6B0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#04201A"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="text-[9.5px] font-bold" style="color:var(--subtext);">TAP</span>
      </div>

      <div class="rounded-xl px-4 py-3 flex items-center gap-3" style="background:#1E2A6B; border:1px solid var(--border);">
        <span style="font-size:24px;">📲</span>
        <div class="relative" style="width:26px; height:2px; background:rgba(255,255,255,0.25);">
          <div id="solution-dot" class="hidden" style="position:absolute; top:-4px; width:8px; height:8px; border-radius:999px; background:#7BE6B0;"></div>
        </div>
        <span style="font-size:24px;">📊</span>
      </div>
    </div>

    <p class="text-xs font-semibold mt-4" style="color:var(--text);">RUMI (WhatsApp) ↔ TaleemHub (the record) — one engine, one record.</p>
    <p id="solution-log" class="text-xs mt-2 min-h-[18px]" style="color:var(--subtext);">Tap play to watch it sync.</p>
  </div>`;
}

function initProblemSolutionModule(){
  const btn = document.getElementById("run-solution");
  if (!btn) return;
  btn.addEventListener("click", () => {
    const dot = document.getElementById("solution-dot");
    const log = document.getElementById("solution-log");
    dot.classList.remove("hidden");
    dot.classList.remove("travel-dot"); void dot.offsetWidth; dot.classList.add("travel-dot");
    log.textContent = "Teacher on WhatsApp: \"Lesson plan\" …";
    setTimeout(() => {
      log.innerHTML = `<span style="color:#7BE6B0;">✓ Synced instantly — Lesson Plans: 11,990 → <strong>11,991</strong></span>`;
    }, 900);
  });
}

function renderDeoModule(){
  return `
  <div class="max-w-3xl mx-auto">

function makeEngine(scrollId, mineRole){
  const eng = { messages: [], seq: 0, typing: false, mineRole };
  eng.render = function(){
    const el = document.getElementById(scrollId);
    if (!el) return;
    el.innerHTML = eng.messages.map(m => waBubbleHtml(m, mineRole)).join("") + (eng.typing ? waTypingHtml() : "");
    el.scrollTop = el.scrollHeight;
  };
  eng.push = function(msg){ eng.seq++; msg.id = eng.seq; eng.messages.push(msg); eng.render(); return msg; };
  eng.say = function(msg, ms, cb){
    eng.typing = true; eng.render();
    setTimeout(() => { eng.typing = false; eng.push(msg); if (cb) setTimeout(cb, 150); }, ms);
  };
  eng.markRead = function(matchFn){
    setTimeout(() => { eng.messages.forEach(m => { if (matchFn(m)) m.read = true; }); eng.render(); }, 400);
  };
  return eng;
}

/* Global click handlers for voice/video, shared across modules */
document.addEventListener("click", (e) => {
  const v = e.target.closest("[data-action='toggle-voice']");
  if (v){
    const vid = v.getAttribute("data-voice-id");
    const dur = parseInt(v.getAttribute("data-duration"), 10);
    const fill = document.getElementById(vid + "-fill");
    const icon = document.getElementById(vid + "-icon");
    if (!fill || !icon || fill.dataset.playing === "1") return;
    fill.dataset.playing = "1";
    fill.style.transition = "none"; fill.style.width = "0%";
    icon.innerHTML = `<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>`;
    requestAnimationFrame(() => { fill.style.transition = `width ${dur}ms linear`; fill.style.width = "100%"; });
    setTimeout(() => { fill.dataset.playing = "0"; icon.innerHTML = `<path d="M8 5v14l11-7z"/>`; }, dur);
    return;
  }
  const p = e.target.closest("[data-action='play-video']");
  if (p){
    const vid = p.getAttribute("data-video-id");
    const bar = document.getElementById(vid + "-bar");
    if (!bar || bar.dataset.playing === "1") return;
    bar.dataset.playing = "1";
    p.style.opacity = "0.4";
    bar.style.transition = "none"; bar.style.width = "0%";
    requestAnimationFrame(() => { bar.style.transition = "width 3000ms linear"; bar.style.width = "100%"; });
    setTimeout(() => { window.dispatchEvent(new CustomEvent("video-done", { detail: { vid } })); }, 3000);
  }
});

    document.querySelectorAll(".aeo-rate").forEach(b => b.addEventListener("click", () => rateHots(b.getAttribute("data-r"))));
  });
}

function rateHots(rating){
  document.getElementById("aeo-actions").innerHTML = "";
  const m1 = aeoVisitEngine.push({ from:"aeo", kind:"text", time:"10:05 AM", text: rating, read:false });

  setTimeout(askHots, 500);
}

function sheetTopBar(title, opts){
  opts = opts || {};
  return `
    <div class="sheet-grabber"></div>
    <div class="flex items-center justify-between mb-2">
      ${opts.cancel ? `<button data-lp="close" class="text-[13px] font-semibold" style="color:var(--wa-accent);">Cancel</button>` : `<button data-lp="${opts.back || 'close'}" style="color:#fff;">‹</button>`}
      <span class="text-[15px] font-bold" style="color:#fff;">${title}</span>
      <span style="color:#8A9296;">•••</span>
    </div>
    ${opts.progress != null ? `<div style="height:3px; background:#3A3A3C; border-radius:3px; margin-bottom:14px;"><div style="height:3px; width:${opts.progress}%; background:var(--wa-accent); border-radius:3px;"></div></div>` : ""}
  `;
}

function sheetRow(label, value, action){
  return `<div class="sheet-row" data-lp="${action}">
      <span class="text-[14px] font-semibold" style="color:#fff;">${label}</span>
      <span class="flex items-center gap-2 text-[13px]" style="color:#98989D;">${value || ""} <span style="color:#636366;">›</span></span>
    </div>`;
}

function renderLpSheet(){
  const el = document.getElementById("lp-scroll-sheet");
  if (!el) return;
  if (!lpSheetView){ el.innerHTML = ""; return; }
  let body = "";

  if (lpSheetView === "browse"){
    const ready = lpSel.grade && lpSel.subject;
    body = sheetTopBar("Lesson Plan", { cancel:true, progress:33 }) + `
      <p class="text-[19px] font-extrabold mb-1" style="color:#fff;">📘 Browse Lesson Plans</p>
      <p class="text-[12.5px] mb-3" style="color:#98989D;">Pick your class and subject.</p>
      <div class="sheet-list">
        ${sheetRow("Grade", lpSel.grade || "", "open-grade")}
        ${sheetRow("Subject", lpSel.subject || "", "open-subject")}
      </div>
      <button data-lp="${ready ? "to-chapter" : ""}" class="sheet-btn" style="background:${ready ? "#25D366" : "#3A3A3C"}; color:${ready ? "#04201A" : "#8A9296"};">Show Chapters</button>
    `;
  } else if (lpSheetView === "grade"){
    body = sheetTopBar("Grade", { back:"browse" }) + `
      <div class="sheet-list">${["Grade 1","Grade 2","Grade 3","Grade 4","Grade 5"].map(g => sheetRow(g, "", "set-grade:" + g)).join("")}</div>`;
  } else if (lpSheetView === "subject"){
    body = sheetTopBar("Subject", { back:"browse" }) + `
      <div class="sheet-list">${["Maths","English","Urdu"].map(s => sheetRow(s, "", "set-subject:" + s)).join("")}</div>`;
  } else if (lpSheetView === "chapterSelect"){
    const ready = !!lpSel.chapter;
    body = sheetTopBar("Select Chapter", { back:"browse", progress:66 }) + `
      <p class="text-[19px] font-extrabold mb-1" style="color:#fff;">${lpSel.grade} — ${lpSel.subject}</p>
      <p class="text-[12.5px] mb-3" style="color:#98989D;">Pick a chapter.</p>
      <div class="sheet-list">${sheetRow("Chapter", lpSel.chapter || "", "open-chapter")}</div>
      <button data-lp="${ready ? "to-lessons" : ""}" class="sheet-btn" style="background:${ready ? "#25D366" : "#3A3A3C"}; color:${ready ? "#04201A" : "#8A9296"};">Show Lessons</button>
    `;
  } else if (lpSheetView === "chapter"){
    const chap = LP_CHAPTERS[lpSel.subject];
    body = sheetTopBar("Chapter", { back:"chapterSelect" }) + `<div class="sheet-list">${sheetRow(chap, "", "set-chapter:" + chap)}</div>`;
  } else if (lpSheetView === "lessons"){
    const days = LP_DAYS[lpSel.subject];
    body = sheetTopBar("Lesson", { back:"chapterSelect" }) + `
      <div class="sheet-list">
        <div class="sheet-row" data-lp="pick-lesson:Full Chapter"><span class="text-[14px] font-semibold" style="color:#fff;">Full Chapter<br><span style="font-size:11px; color:#98989D; font-weight:400;">All 5 lessons</span></span><span style="color:#25D366;">✓</span></div>
        ${days.map(x => `<div class="sheet-row" data-lp="pick-lesson:${x.d}"><span class="text-[14px] font-semibold" style="color:#fff;">${x.d}<br><span style="font-size:11px; color:#98989D; font-weight:400;">${x.s}</span></span></div>`).join("")}
      </div>`;
  }

  el.innerHTML = `<div class="sheet-overlay"><div class="sheet-panel fade-up">${body}</div></div>`;
}

document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-lp]");
  if (!t) return;
  const action = t.getAttribute("data-lp");
  if (!action) return;
  if (action === "close"){ closeLpSheet(); return; }
  if (action === "browse" || action === "chapterSelect"){ openLpSheet(action); return; }
  if (action === "to-chapter"){ openLpSheet("chapterSelect"); return; }
  if (action === "to-lessons"){ openLpSheet("lessons"); return; }
  if (action === "open-grade"){ openLpSheet("grade"); return; }
  if (action === "open-subject"){ openLpSheet("subject"); return; }
  if (action === "open-chapter"){ openLpSheet("chapter"); return; }
  if (action.startsWith("set-grade:")){ lpSel.grade = action.split(":")[1]; openLpSheet("browse"); return; }
  if (action.startsWith("set-subject:")){ lpSel.subject = action.split(":")[1]; lpSel.chapter = null; openLpSheet("browse"); return; }
  if (action.startsWith("set-chapter:")){ lpSel.chapter = action.split(":").slice(1).join(":"); openLpSheet("chapterSelect"); return; }
  if (action.startsWith("pick-lesson:")){
    const day = action.split(":")[1];
    closeLpSheet();
    runLessonPlanFlow(day);
    return;
  }
});

function runLessonPlanFlow(dayLabel){
  if (lpBusy || lpDone) return;
  lpBusy = true;
  const summary = `${lpSel.grade} · ${lpSel.subject} · ${dayLabel}`;
  const m2 = lpEngine.push({ from:"teacher", kind:"text", time:"12:15 PM", text: summary, read:false });
  lpEngine.markRead(m => m.id === m2.id);
  lpEngine.say({ from:"rumi", kind:"text", time:"12:15 PM", text:"Yahan hai aapka lesson plan 👇" }, 900, () => {
    const useDayCard = lpSel.subject === "Urdu" && LP_DAY_DETAIL_URDU[dayLabel];
    const cardMsg = useDayCard
      ? { from:"rumi", kind:"dayCard", time:"12:15 PM", detail: LP_DAY_DETAIL_URDU[dayLabel] }
      : { from:"rumi", kind:"card", time:"12:15 PM",
          header: `${dayLabel.toUpperCase()} · ${lpSel.grade.toUpperCase()} ${lpSel.subject.toUpperCase()}`,
          subhead: `${lpSel.subject} — ${dayLabel}`, goal: "See lesson objective" };
    lpEngine.say(cardMsg, 900, () => {
      lpEngine.say({ from:"rumi", kind:"voice", time:"12:16 PM", duration:"0:09", vid:"lpv1", duration_ms:2600 }, 700, () => {
        lpDone = true; lpBusy = false;
        lpCounter += 1;
        document.getElementById("lp-counter").textContent = lpCounter.toLocaleString();
        document.getElementById("lp-counter").classList.add("stat-bump");
        document.getElementById("lp-log").innerHTML = `<p class="text-xs" style="color:#7BE6B0;">✓ Synced to TaleemHub — ${summary} logged, just now.</p>`;
      });
    });
  });
}

  trainEngine.markRead(m => m.id === m1.id);
  trainEngine.say({ from:"rumi", kind:"text", time:"9:31 AM", text:"Shabash 👏" }, 900, () => {
    trainEngine.say({ from:"rumi", kind:"text", time:"9:31 AM", text:"Aap is training ko 1 se 5 stars mein rate karengi? Apna rating digit bhej dein." }, 900, () => {
      document.getElementById("tr-actions").innerHTML = [1,2,3,4,5].map(n => `
        <button data-star="${n}" class="tr-star px-3 py-1.5 rounded-full text-[11.5px] font-bold" style="border:1.5px solid var(--wa-accent); color:var(--wa-accent);">${"⭐".repeat(n)} ${n}</button>`).join("");
      document.querySelectorAll(".tr-star").forEach(b => b.addEventListener("click", () => rateTraining(b.getAttribute("data-star"))));
    });
  });
}

function rateTraining(n){
  if (trainDone) return;
  document.getElementById("tr-actions").innerHTML = "";
  const m2 = trainEngine.push({ from:"teacher", kind:"text", time:"9:31 AM", text:n, read:false });
  trainEngine.markRead(m => m.id === m2.id);
  trainEngine.say({ from:"rumi", kind:"text", time:"9:31 AM", text:"Aap ne is indicator ki training mukammal kar li. Agla indicator agle haftay share karunga 🎉" }, 900, () => {
    trainDone = true; trainBusy = false;
    document.getElementById("tr-log").innerHTML = `<p class="text-xs" style="color:#7BE6B0;">✓ Training complete — self-paced, no venue, no fixed schedule.</p>`;
  });
}

</script>
