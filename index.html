<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaleemHub & RUMI — Interactive Walkthrough</title>
<script>
  // Silence the expected "cdn.tailwindcss.com should not be used in production" console warning for this demo file.
  const _origWarn = console.warn;
  console.warn = function(...args) {
    if (args.some(a => typeof a === "string" && a.includes("cdn.tailwindcss.com"))) return;
    _origWarn.apply(console, args);
  };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --bg:#0B0F2A; --card:#141B3D; --card2:#1A2247; --border:rgba(255,255,255,0.08);
    --pink:#E6A8F0; --purple:#A78BFA; --text:#F2F0FA; --subtext:#9AA3C7;
    --wa-bg:#0B0F10; --wa-header:#171B1C; --wa-incoming:#1F2426; --wa-outgoing:#0B4A3B;
    --wa-text:#ECEFF0; --wa-subtext:#8A9296; --wa-accent:#25D366; --wa-link:#4FC3F7;
  }
  * { box-sizing: border-box; }
  body { font-family:'Segoe UI', system-ui, -apple-system, Arial, sans-serif; background:var(--bg); }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius:999px; }
  .hidden { display:none !important; }
  @keyframes fadeUp { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .fade-up { animation: fadeUp .3s ease-out; }
  @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:.5;} 30%{transform:translateY(-4px);opacity:1;} }
  .typing-dot { animation: typingDot 1.1s infinite ease-in-out; }
  @keyframes pulseRing { 0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.45);} 50%{box-shadow:0 0 0 10px rgba(37,211,102,0);} }
  .pulse-ring { animation: pulseRing 2.2s infinite; }
  @keyframes travel { from{transform:translateX(-40px);opacity:0;} 20%{opacity:1;} to{transform:translateX(220px);opacity:0;} }
  .travel-dot { animation: travel 1.4s ease-in-out forwards; }
  .voice-bar-fill { width:0%; }
  .menu-card { transition: transform .15s ease, border-color .15s ease; }
  .menu-card:hover { transform: translateY(-2px); border-color: var(--purple); }
  .stat-bump { animation: bump .4s ease; }
  @keyframes bump { 40%{ transform:scale(1.05); box-shadow:0 0 0 3px rgba(167,139,250,.3);} 100%{transform:scale(1);} }
  .sheet-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:flex-end; z-index:30; }
  .sheet-panel { width:100%; background:#1c1c1e; border-radius:20px 20px 0 0; padding:10px 16px 16px; max-height:92%; overflow-y:auto; }
  .sheet-grabber { width:36px; height:4px; border-radius:4px; background:#48484a; margin:0 auto 10px; }
  .sheet-row { display:flex; align-items:center; justify-content:space-between; padding:13px 2px; border-bottom:1px solid rgba(255,255,255,0.08); cursor:pointer; }
  .sheet-row:last-child { border-bottom:none; }
  .sheet-list { background:#2c2c2e; border-radius:12px; padding:0 12px; margin-top:14px; }
  .sheet-btn { width:100%; padding:13px; border-radius:12px; text-align:center; font-weight:700; font-size:14px; margin-top:16px; }
</style>
</head>
<body class="min-h-screen text-white">

<div class="max-w-5xl mx-auto px-4 py-10">

  <!-- ================= MENU VIEW ================= -->
  <div id="view-menu">
    <div class="text-center mb-10 max-w-2xl mx-auto">
      <p class="text-xs tracking-widest font-bold" style="color:var(--pink);">Q2 2026 · RAWALPINDI DISTRICT</p>
      <h1 class="text-3xl font-extrabold mt-2" style="color:var(--text);">TaleemHub &amp; RUMI</h1>
      <p class="text-sm mt-3" style="color:var(--subtext);">
        The problem, the solution, then RUMI in action for AEOs, teachers, and students. Click any step to open its real simulation.
      </p>
    </div>

    <div class="flex flex-col gap-3" id="menu-list">
      <!-- cards injected by JS -->
    </div>
  </div>

  <!-- ================= MODULE VIEW ================= -->
  <div id="view-module" class="hidden">
    <div class="flex items-center justify-between mb-6">
      <button id="back-btn" class="flex items-center gap-2 text-sm font-semibold" style="color:var(--subtext);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m15 18-6-6 6-6"/></svg>
        Back to overview
      </button>
      <button id="restart-btn" class="flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-full" style="color:var(--purple); border:1px solid var(--border);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
        Restart simulation
      </button>
    </div>
    <div id="module-content"></div>
  </div>

</div>

<script>

/* =====================================================================
   MENU DATA
===================================================================== */
const MENU = [
  { n:1, icon:"🔄", title:"From Chaos → One Record", desc:"The problem and the solution, in one look.", tag:"OVERVIEW" },
  { n:2, icon:"📡", title:"DEO Flow: One-Tap Overview", desc:"AEO, teacher, student — every layer, one tap.", tag:"SIMULATION" },
  { n:3, icon:"🏫", title:"AEO Flow: Mentoring Visit", desc:"Rate HOTS indicators during a school visit.", tag:"SIMULATION" },
  { n:4, icon:"🎬", title:"AEO Flow: Training", desc:"A scenario, a voice reply, a rating.", tag:"SIMULATION" },
  { n:5, icon:"🤝", title:"AEO Flow: RUMI Mentor", desc:"Stuck with a teacher? Ask RUMI for advice.", tag:"SIMULATION" },
  { n:6, icon:"📘", title:"Teacher Flow: Lesson Plans", desc:"Pick a grade, get a lesson, in seconds.", tag:"SIMULATION" },
  { n:7, icon:"🎥", title:"Teacher Flow: Digital Coach", desc:"Send a voice note, get a coaching report.", tag:"SIMULATION" },
  { n:8, icon:"📚", title:"Storybook", desc:"For teachers and students — grade, language, PDF.", tag:"SIMULATION" },
  { n:9, icon:"🎬", title:"Teacher Flow: Training", desc:"Watch a scenario. Choose your move.", tag:"SIMULATION" },
  { n:10, icon:"🔤", title:"Student Flow: Summer Learning Tasks", desc:"The phonics game 15,000+ students play.", tag:"SIMULATION" },
  { n:11, icon:"📝", title:"Teacher Flow: Summer Homework", desc:"Grade & subject → a print-ready worksheet.", tag:"SIMULATION" },
];

function renderMenu(){
  const list = document.getElementById("menu-list");
  list.innerHTML = MENU.map(m => `
    <button data-open="${m.n}" class="menu-card fade-up flex items-center gap-4 text-left rounded-2xl p-4" style="background:var(--card); border:1px solid var(--border);">
      <div class="flex items-center justify-center rounded-xl flex-shrink-0" style="width:44px;height:44px;background:var(--card2); font-size:20px;">${m.icon}</div>
      <div class="flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          <p class="font-bold text-sm" style="color:var(--text);">${m.n}. ${m.title}</p>
          <span class="text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:${m.tag==='SIMULATION' ? 'rgba(167,139,250,0.18)' : 'rgba(230,168,240,0.15)'}; color:${m.tag==='SIMULATION' ? 'var(--purple)' : 'var(--pink)'};">${m.tag}</span>
        </div>
        <p class="text-xs mt-0.5" style="color:var(--subtext);">${m.desc}</p>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--subtext)" stroke-width="2.4"><path d="m9 18 6-6-6-6"/></svg>
    </button>`).join("");
}
renderMenu();

document.getElementById("menu-list").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-open]");
  if (!btn) return;
  openModule(parseInt(btn.getAttribute("data-open"), 10));
});
document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("view-module").classList.add("hidden");
  document.getElementById("view-menu").classList.remove("hidden");
});

document.getElementById("restart-btn").addEventListener("click", () => {
  if (currentModuleN) openModule(currentModuleN);
});

let currentModuleN = null;

function openModule(n){
  currentModuleN = n;
  document.getElementById("view-menu").classList.add("hidden");
  const mv = document.getElementById("view-module");
  mv.classList.remove("hidden");
  const mc = document.getElementById("module-content");
  if (n === 1) { mc.innerHTML = renderProblemSolution(); initProblemSolutionModule(); }
  if (n === 2) { mc.innerHTML = renderDeoModule(); initDeoModule(); }
  if (n === 3) { mc.innerHTML = renderAeoVisitModule(); initAeoVisitModule(); }
  if (n === 4) { mc.innerHTML = renderAeoTrainingModule(); initAeoTrainingModule(); }
  if (n === 5) { mc.innerHTML = renderAeoMentorModule(); initAeoMentorModule(); }
  if (n === 6) { mc.innerHTML = renderLessonPlanModule(); initLessonPlanModule(); }
  if (n === 7) { mc.innerHTML = renderCoachModule(); initCoachModule(); }
  if (n === 8) { mc.innerHTML = renderStorybookModule(); initStorybookModule(); }
  if (n === 9) { mc.innerHTML = renderTrainingModule(); initTrainingModule(); }
  if (n === 10) { mc.innerHTML = renderPhonicsModule(); initPhonicsModule(); }
  if (n === 11) { mc.innerHTML = renderHomeworkModule(); initHomeworkModule(); }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* =====================================================================
   MODULE 1 — THE PROBLEM → THE SOLUTION (merged, minimal text)
===================================================================== */
const BEFORE_CHIPS = [
  { icon:"📋", label:"Paperwork" },
  { icon:"👁️", label:"No Visibility" },
  { icon:"❓", label:"No Proof" },
];

function renderProblemSolution(){
  return `
  <div class="max-w-3xl mx-auto text-center">
    <p class="text-xs font-bold tracking-wide" style="color:var(--pink);">STEP 1 · THE STORY</p>
    <h2 class="text-2xl font-extrabold mt-1 mb-6" style="color:var(--text);">From Chaos → One Record</h2>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <div class="flex gap-2">
        ${BEFORE_CHIPS.map(c => `
          <div class="rounded-xl px-3 py-3 flex flex-col items-center gap-1" style="background:var(--card); border:1px solid var(--border); width:88px;">
            <span style="font-size:24px;">${c.icon}</span>
            <span class="text-[10.5px] font-semibold" style="color:var(--subtext);">${c.label}</span>
          </div>`).join("")}
      </div>

      <div class="flex flex-col items-center gap-1 px-2">
        <button id="run-solution" class="flex items-center justify-center rounded-full pulse-ring" style="width:46px; height:46px; background:#7BE6B0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#04201A"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="text-[9.5px] font-bold" style="color:var(--subtext);">TAP</span>
      </div>

      <div class="rounded-xl px-4 py-3 flex items-center gap-3" style="background:#1E2A6B; border:1px solid var(--border);">
        <span style="font-size:24px;">📲</span>
        <div class="relative" style="width:26px; height:2px; background:rgba(255,255,255,0.25);">
          <div id="solution-dot" class="hidden" style="position:absolute; top:-4px; width:8px; height:8px; border-radius:999px; background:#7BE6B0;"></div>
        </div>
        <span style="font-size:24px;">📊</span>
      </div>
    </div>

    <p class="text-xs font-semibold mt-4" style="color:var(--text);">RUMI (WhatsApp) ↔ TaleemHub (the record) — one engine, one record.</p>
    <p id="solution-log" class="text-xs mt-2 min-h-[18px]" style="color:var(--subtext);">Tap play to watch it sync.</p>
  </div>`;
}

function initProblemSolutionModule(){
  const btn = document.getElementById("run-solution");
  if (!btn) return;
  btn.addEventListener("click", () => {
    const dot = document.getElementById("solution-dot");
    const log = document.getElementById("solution-log");
    dot.classList.remove("hidden");
    dot.classList.remove("travel-dot"); void dot.offsetWidth; dot.classList.add("travel-dot");
    log.textContent = "Teacher on WhatsApp: \"Lesson plan\" …";
    setTimeout(() => {
      log.innerHTML = `<span style="color:#7BE6B0;">✓ Synced instantly — Lesson Plans: 11,990 → <strong>11,991</strong></span>`;
    }, 900);
  });
}

/* =====================================================================
   MODULE 2 — DEO FLOW: ONE-TAP OVERVIEW
===================================================================== */
function renderDeoModule(){
  return `
  <div class="max-w-3xl mx-auto">
    <p class="text-xs font-bold tracking-wide" style="color:var(--pink);">STEP 2 · DEO FLOW</p>
    <h2 class="text-2xl font-extrabold mt-1 mb-1" style="color:var(--text);">📡 One-Tap Overview</h2>
    <p class="text-sm mb-6" style="color:var(--subtext);">DEOs use the same RUMI chat — just to see, not to act.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      ${phoneShell("deo-scroll", "deo-actions", "Rumi", 380)}
      <div>
        <div class="rounded-xl p-4 mb-3" style="background:var(--card); border:1px solid var(--border);">
          <p class="text-xs font-bold mb-1" style="color:var(--text);">Why this matters</p>
          <p class="text-xs" style="color:var(--subtext); line-height:1.5;">No separate report to request, no waiting on an AEO to compile numbers — the DEO asks RUMI directly.</p>
        </div>
        <div id="deo-log" class="rounded-xl p-4 min-h-[60px]" style="background:var(--card2); border:1px solid var(--border);">
          <p class="text-xs" style="color:var(--subtext);">Ask RUMI for today's overview.</p>
        </div>
      </div>
    </div>
  </div>`;
}

function initDeoModule(){
  const deoEngine = makeEngine("deo-scroll", "deo");
  document.getElementById("deo-scroll").innerHTML = `
    <div class="h-full flex flex-col items-center justify-center text-center px-6">
      <div class="pulse-ring flex items-center justify-center rounded-full mb-4" style="width:54px;height:54px;background:var(--wa-accent);">
        <span style="font-size:22px;">📡</span>
      </div>
      <p class="text-[13px] mb-4" style="color:var(--wa-text);">A DEO wants today's district picture.</p>
      <button id="deo-start" class="px-5 py-2.5 rounded-full text-[13px] font-bold" style="background:var(--wa-accent); color:#04201A;">Start the chat</button>
    </div>`;
  document.getElementById("deo-start").addEventListener("click", () => {
    document.getElementById("deo-scroll").innerHTML = "";
    setTimeout(() => {
      const m1 = deoEngine.push({ from:"deo", kind:"text", time:"8:30 AM", text:"Aaj ka overview bhejo", read:false });
      deoEngine.markRead(m => m.id === m1.id);
      deoEngine.say({ from:"rumi", kind:"text", time:"8:30 AM", text:"Bilkul! Yeh hai aaj ka overview 👇" }, 900, () => {
        deoEngine.say({ from:"rumi", kind:"layerCard", time:"8:31 AM", icon:"🏫", label:"AEO LAYER", stat:"24 AEOs active", sub:"491 field visits logged this month", color:"#EC5A9C" }, 800, () => {
          deoEngine.say({ from:"rumi", kind:"layerCard", time:"8:31 AM", icon:"📘", label:"TEACHER LAYER", stat:"1,136 teachers", sub:"11,990 lesson plans · 2,170 coaching observations", color:"#9B6BF2" }, 800, () => {
            deoEngine.say({ from:"rumi", kind:"layerCard", time:"8:31 AM", icon:"🔤", label:"STUDENT LAYER", stat:"15,000+ students", sub:"Summer Learning Tasks live in 261 schools", color:"#4FC3F7" }, 800, () => {
              deoEngine.say({ from:"rumi", kind:"text", time:"8:32 AM", text:"One tap. Every layer. No waiting for reports." }, 800, () => {
                document.getElementById("deo-log").innerHTML = `<p class="text-xs" style="color:#7BE6B0;">✓ Overview delivered — same RUMI thread, no separate dashboard login.</p>`;
              });
            });
          });
        });
      });
    }, 300);
  });
}

/* =====================================================================
   Shared WhatsApp chat engine + bubble renderer (used by modules 3,4,5,6)
===================================================================== */
function waTypingHtml(){
  return `<div class="flex justify-start mb-2"><div class="flex items-center gap-1 px-3 py-2.5 rounded-2xl" style="background:var(--wa-incoming);">
    <span class="typing-dot inline-block rounded-full" style="width:5px;height:5px;background:var(--wa-subtext);"></span>
    <span class="typing-dot inline-block rounded-full" style="width:5px;height:5px;background:var(--wa-subtext); animation-delay:.15s;"></span>
    <span class="typing-dot inline-block rounded-full" style="width:5px;height:5px;background:var(--wa-subtext); animation-delay:.3s;"></span>
  </div></div>`;
}

function tickIconHtml(read){
  return read
    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4FC3F7" stroke-width="3"><path d="m2 12 5 5L18 6"/><path d="m9 12 5 5L25 6"/></svg>`
    : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#8A9296" stroke-width="3"><path d="m5 13 4 4L19 7"/></svg>`;
}

function waBubbleHtml(m, mineRole){
  const mine = m.from === mineRole;
  let inner = "";
  if (m.kind === "text") inner = `<span class="text-[13.5px]" style="line-height:1.45; color:var(--wa-text);">${m.text}</span>`;
  else if (m.kind === "menu") inner = `<div class="rounded-lg p-3" style="background:#262C2E; width:210px;">
      <p class="text-[13px] font-bold" style="color:var(--wa-text);">${m.title || "📘 Lesson Plans"}</p>
      <p class="text-[12px] mt-1" style="color:var(--wa-text); line-height:1.5;">${m.body || "Ready-made plans for Grades 1–5."}</p>
      <p class="text-[12px] mt-2" style="color:var(--wa-link); text-decoration:underline;">${m.link || "Browse Lesson Plans"}</p>
    </div>`;
  else if (m.kind === "card") inner = `<div class="rounded-lg overflow-hidden" style="width:210px;">
      <div class="flex items-center justify-between px-3 py-1.5" style="background:#3A2E52;">
        <span class="text-[10px] font-bold text-white">${m.header || "DAY 3 · GRADE 5 MATHS"}</span><span class="text-[9px]" style="color:#D8CCF2;">${m.mins || "30 min"}</span>
      </div>
      <div class="p-3" style="background:#EFE9FA;">
        <p class="text-[12px] font-bold mb-1" style="color:#2A1F44;">${m.subhead || "Fractions — Warm-Up Review"}</p>
        <div class="grid grid-cols-2 gap-2">
          <div class="rounded px-2 py-1.5" style="background:#fff;"><p class="text-[9px] font-bold" style="color:#8A7BB0;">OBJECTIVE</p><p class="text-[10px]" style="color:#2A1F44;">${m.goal || "Compare fractions"}</p></div>
          <div class="rounded px-2 py-1.5" style="background:#fff;"><p class="text-[9px] font-bold" style="color:#8A7BB0;">${m.slo ? "SLO · PAGES" : "PAGES"}</p><p class="text-[10px]" style="color:#2A1F44;">${m.slo ? m.slo + " · " : ""}p.${m.pages || "1"}</p></div>
        </div>
      </div>
    </div>`;
  else if (m.kind === "phonicsImage") inner = `<div class="rounded-lg overflow-hidden" style="width:170px;">
      <div class="flex items-center justify-center" style="height:120px; background:linear-gradient(160deg,#FDE9C8,#F7C77E);"><span style="font-size:56px;">${m.emoji || "🐱"}</span></div>
      <p class="text-[10.5px] px-2 py-1.5 text-center" style="background:#262C2E; color:var(--wa-text);">Yeh lafz kya hai?</p>
    </div>`;
  else if (m.kind === "realvideo") inner = `<div class="rounded-lg overflow-hidden" style="width:210px;">
      <video controls playsinline preload="metadata" style="width:100%; display:block; background:#000;">
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
      </video>
      <p class="text-[10.5px] px-2 py-1.5" style="background:#1B2140; color:var(--wa-text);">${m.caption || "Classroom scenario · 0:12"}</p>
    </div>`;
  else if (m.kind === "report") inner = `<div class="rounded-lg overflow-hidden" style="width:230px;">
      <div class="px-3 py-1.5" style="background:#3A2E52;"><span class="text-[10px] font-bold text-white">📝 COACHING REPORT · FROM YOUR VOICE NOTE</span></div>
      <div class="p-3" style="background:#EFE9FA;">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[11px] font-bold" style="color:#2A1F44;">Overall score</span>
          <span class="text-[13px] font-extrabold" style="color:#1FAE6A;">${m.score || "62%"}</span>
        </div>
        <p class="text-[9.5px] font-bold mb-1" style="color:#1FAE6A;">✓ STRENGTHS</p>
        <p class="text-[10.5px] mb-2" style="color:#4A3C6B; line-height:1.4;">${m.strengths || "Clear pacing · used a real-life example"}</p>
        <p class="text-[9.5px] font-bold mb-1" style="color:#E0743C;">△ TO IMPROVE</p>
        <p class="text-[10.5px]" style="color:#4A3C6B; line-height:1.4;">${m.improve || "Give students more time to answer"}</p>
      </div>
    </div>`;
  else if (m.kind === "voice"){
    const vid = m.vid;
    inner = `<div class="flex items-center gap-2" style="min-width:160px;">
      <button data-action="toggle-voice" data-voice-id="${vid}" data-duration="${m.duration_ms || 2600}" class="flex items-center justify-center rounded-full flex-shrink-0" style="width:28px;height:28px;background:${mine ? '#0E6B54' : 'var(--wa-accent)'};">
        <svg id="${vid}-icon" width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div style="width:90px; height:4px; background:rgba(236,239,240,0.3); border-radius:999px; overflow:hidden;">
        <div id="${vid}-fill" class="voice-bar-fill" style="height:4px; background:var(--wa-link);"></div>
      </div>
      <span id="${vid}-time" class="text-[10px]" style="color:var(--wa-subtext);">${m.duration || "0:09"}</span>
      ${m.speed ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style="background:rgba(255,255,255,0.12); color:var(--wa-text);">${m.speed}</span>` : ""}
      ${m.audio ? `<audio id="${vid}-audio" src="${m.audio}" preload="none"></audio>` : ""}
    </div>`;
  }
  else if (m.kind === "docLink") inner = `<a href="${m.href}" target="_blank" rel="noopener" class="flex items-center gap-2 rounded-lg p-2" style="background:#262C2E; width:222px; text-decoration:none;">
      <div class="flex items-center justify-center rounded flex-shrink-0" style="width:36px;height:36px;background:${m.color || '#D64545'};">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><path d="M6 2h9l5 5v15H6z"/></svg>
      </div>

function makeEngine(scrollId, mineRole){
  const eng = { messages: [], seq: 0, typing: false, mineRole };
  eng.render = function(){
    const el = document.getElementById(scrollId);
    if (!el) return;
    el.innerHTML = eng.messages.map(m => waBubbleHtml(m, mineRole)).join("") + (eng.typing ? waTypingHtml() : "");
    el.scrollTop = el.scrollHeight;
  };
  eng.push = function(msg){ eng.seq++; msg.id = eng.seq; eng.messages.push(msg); eng.render(); return msg; };
  eng.say = function(msg, ms, cb){
    eng.typing = true; eng.render();
    setTimeout(() => { eng.typing = false; eng.push(msg); if (cb) setTimeout(cb, 150); }, ms);
  };
  eng.markRead = function(matchFn){
    setTimeout(() => { eng.messages.forEach(m => { if (matchFn(m)) m.read = true; }); eng.render(); }, 400);
  };
  return eng;
}

/* Global click handlers for voice/video, shared across modules */
document.addEventListener("click", (e) => {
  const v = e.target.closest("[data-action='toggle-voice']");
  if (v){
    const vid = v.getAttribute("data-voice-id");
    const dur = parseInt(v.getAttribute("data-duration"), 10);
    const fill = document.getElementById(vid + "-fill");
    const icon = document.getElementById(vid + "-icon");
    const audio = document.getElementById(vid + "-audio");
    const playIcon = `<path d="M8 5v14l11-7z"/>`;
    const pauseIcon = `<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>`;
    if (!fill || !icon) return;
    // Real audio playback (voice notes wired to actual mp3 files)
    if (audio && audio.getAttribute("src")){
      document.querySelectorAll("audio").forEach(a => { if (a !== audio && !a.paused) a.pause(); });
      if (audio.paused){
        icon.innerHTML = pauseIcon;
        fill.style.transition = "width .2s linear";
        audio.play().catch(() => { icon.innerHTML = playIcon; });
        audio.ontimeupdate = () => {
          if (audio.duration){ fill.style.width = (audio.currentTime / audio.duration * 100) + "%"; }
          const t = document.getElementById(vid + "-time");
          if (t && audio.duration){ const r = Math.max(0, audio.duration - audio.currentTime); t.textContent = Math.floor(r/60) + ":" + String(Math.floor(r%60)).padStart(2,"0"); }
        };
        audio.onended = () => { icon.innerHTML = playIcon; fill.style.width = "0%"; };
        audio.onpause = () => { icon.innerHTML = playIcon; };
      } else {
        audio.pause();
      }
      return;
    }
    // Fallback: animated placeholder (used by scenario/coach voice notes)
    if (fill.dataset.playing === "1") return;
    fill.dataset.playing = "1";
    fill.style.transition = "none"; fill.style.width = "0%";
    icon.innerHTML = pauseIcon;
    requestAnimationFrame(() => { fill.style.transition = `width ${dur}ms linear`; fill.style.width = "100%"; });
    setTimeout(() => { fill.dataset.playing = "0"; icon.innerHTML = playIcon; }, dur);
    return;
  }
  const p = e.target.closest("[data-action='play-video']");
  if (p){
    const vid = p.getAttribute("data-video-id");
    const bar = document.getElementById(vid + "-bar");
    if (!bar || bar.dataset.playing === "1") return;
    bar.dataset.playing = "1";
    p.style.opacity = "0.4";
    bar.style.transition = "none"; bar.style.width = "0%";
    requestAnimationFrame(() => { bar.style.transition = "width 3000ms linear"; bar.style.width = "100%"; });
    setTimeout(() => { window.dispatchEvent(new CustomEvent("video-done", { detail: { vid } })); }, 3000);
  }
});

===================================================================== */
let aeoTrainEngine, aeoTrainBusy = false, aeoTrainDone = false;

function renderAeoTrainingModule(){
  return `
  <div class="max-w-3xl mx-auto">
    <p class="text-xs font-bold tracking-wide" style="color:var(--pink);">STEP 4 · AEO FLOW</p>
    <h2 class="text-2xl font-extrabold mt-1 mb-1" style="color:var(--text);">🎬 AEO Training</h2>
    <p class="text-sm mb-6" style="color:var(--subtext);">Same self-paced training — AEO-specific scenarios.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      ${phoneShell("aeotr-scroll", "aeotr-actions", "Rumi", 380)}
      <div>
        <div class="rounded-xl p-4 mb-3" style="background:var(--card); border:1px solid var(--border);">
          <p class="text-xs font-bold mb-1" style="color:var(--text);">Today's scenario</p>
          <p class="text-xs" style="color:var(--subtext); line-height:1.5;">A teacher gets defensive during feedback. How do you keep the conversation coaching, not confrontational?</p>
        </div>
        <div id="aeotr-log" class="rounded-xl p-4 min-h-[60px]" style="background:var(--card2); border:1px solid var(--border);">
          <p class="text-xs" style="color:var(--subtext);">Watch the scenario, then reply with a voice note.</p>
        </div>
      </div>
    </div>
  </div>`;
}

function initAeoTrainingModule(){
  aeoTrainEngine = makeEngine("aeotr-scroll", "aeo");
  aeoTrainBusy = false; aeoTrainDone = false;
  document.getElementById("aeotr-scroll").innerHTML = `
    <div class="h-full flex flex-col items-center justify-center text-center px-6">
      <div class="pulse-ring flex items-center justify-center rounded-full mb-4" style="width:54px;height:54px;background:var(--wa-accent);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="m23 7-7 5 7 5V7Z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <p class="text-[13px] mb-4" style="color:var(--wa-text);">Today's AEO training scenario is ready.</p>
      <button id="aeotr-start" class="px-5 py-2.5 rounded-full text-[13px] font-bold" style="background:var(--wa-accent); color:#04201A;">Start the scenario</button>
    </div>`;
  document.getElementById("aeotr-start").addEventListener("click", () => {
    document.getElementById("aeotr-scroll").innerHTML = "";
    setTimeout(() => {
      aeoTrainEngine.say({ from:"rumi", kind:"realvideo", time:"9:10 AM", vid:"aeotrv1", caption:"Feedback scenario · tap play" }, 700, () => {
        aeoTrainEngine.say({ from:"rumi", kind:"text", time:"9:12 AM", text:"Yeh raha scenario. Teacher aapke feedback par defensive ho gaya. Sun kar bataiye aap kya karengi." }, 900, () => {
          aeoTrainEngine.say({ from:"rumi", kind:"voice", time:"9:12 AM", duration:"0:38", speed:"1.5×", vid:"aeotr-audio", duration_ms:2600 }, 800, () => {
            document.getElementById("aeotr-actions").innerHTML = `<button id="aeotr-reply" class="px-3 py-1.5 rounded-full text-[11.5px] font-bold" style="border:1.5px solid var(--wa-accent); color:var(--wa-accent);">🎙️ Record my response</button>`;
            document.getElementById("aeotr-reply").addEventListener("click", recordAeoTrainingReply);
          });
        });
      });
    }, 300);
  });
}

function recordAeoTrainingReply(){
  if (aeoTrainBusy || aeoTrainDone) return;
  aeoTrainBusy = true;
  document.getElementById("aeotr-actions").innerHTML = "";
  const m1 = aeoTrainEngine.push({ from:"aeo", kind:"voice", time:"9:14 AM", duration:"0:16", vid:"aeotr-reply-v", duration_ms:2600, read:false });
  aeoTrainEngine.markRead(m => m.id === m1.id);
  aeoTrainEngine.say({ from:"rumi", kind:"text", time:"9:15 AM", text:"Shabash 👏 Defensiveness ko normalize karna aur specific example dena — yehi sahi tareeqa hai." }, 900, () => {
    aeoTrainEngine.say({ from:"rumi", kind:"text", time:"9:15 AM", text:"Is training ko 1 se 5 stars mein rate karengi?" }, 800, () => {
      document.getElementById("aeotr-actions").innerHTML = [1,2,3,4,5].map(n => `
        <button data-star="${n}" class="aeotr-star px-3 py-1.5 rounded-full text-[11px] font-bold" style="border:1.5px solid var(--wa-accent); color:var(--wa-accent);">${"⭐".repeat(n)} ${n}</button>`).join("");
      document.querySelectorAll(".aeotr-star").forEach(b => b.addEventListener("click", () => rateAeoTraining(b.getAttribute("data-star"))));
    });
  });
}

function rateAeoTraining(n){
  if (aeoTrainDone) return;
  document.getElementById("aeotr-actions").innerHTML = "";

function lpGet(){
  if (!lpSel.grade || !lpSel.subject) return null;
  const g = String(lpSel.grade).replace(/\D/g, "");
  const subj = LP_DATA[lpSel.subject];
  return subj ? subj[g] : null;
}
function lpDay(label){
  const c = lpGet(); if (!c || !c.days.length) return null;
  if (label === "Full Chapter") return c.days[0];
  return c.days.find(x => x.d === label) || c.days[0];
}

function renderLpSheet(){
  const el = document.getElementById("lp-scroll-sheet");
  if (!el) return;
  if (!lpSheetView){ el.innerHTML = ""; return; }
  let body = "";

  if (lpSheetView === "browse"){
    const ready = lpSel.grade && lpSel.subject;
    body = sheetTopBar("Lesson Plan", { cancel:true, progress:33 }) + `
      <p class="text-[19px] font-extrabold mb-1" style="color:#fff;">📘 Browse Lesson Plans</p>
      <p class="text-[12.5px] mb-3" style="color:#98989D;">Pick your class and subject.</p>
      <div class="sheet-list">
        ${sheetRow("Grade", lpSel.grade || "", "open-grade")}
        ${sheetRow("Subject", lpSel.subject || "", "open-subject")}
      </div>
      <button data-lp="${ready ? "to-chapter" : ""}" class="sheet-btn" style="background:${ready ? "#25D366" : "#3A3A3C"}; color:${ready ? "#04201A" : "#8A9296"};">Show Chapters</button>
    `;
  } else if (lpSheetView === "grade"){
    body = sheetTopBar("Grade", { back:"browse" }) + `
      <div class="sheet-list">${["Grade 1","Grade 2","Grade 3","Grade 4","Grade 5"].map(g => sheetRow(g, "", "set-grade:" + g)).join("")}</div>`;
  } else if (lpSheetView === "subject"){
    body = sheetTopBar("Subject", { back:"browse" }) + `
      <div class="sheet-list">${["Maths","English","Urdu"].map(s => sheetRow(s, "", "set-subject:" + s)).join("")}</div>`;
  } else if (lpSheetView === "chapterSelect"){
    const ready = !!lpSel.chapter;
    body = sheetTopBar("Select Chapter", { back:"browse", progress:66 }) + `
      <p class="text-[19px] font-extrabold mb-1" style="color:#fff;">${lpSel.grade} — ${lpSel.subject}</p>
      <p class="text-[12.5px] mb-3" style="color:#98989D;">Pick a chapter.</p>
      <div class="sheet-list">${sheetRow("Chapter", lpSel.chapter || "", "open-chapter")}</div>
      <button data-lp="${ready ? "to-lessons" : ""}" class="sheet-btn" style="background:${ready ? "#25D366" : "#3A3A3C"}; color:${ready ? "#04201A" : "#8A9296"};">Show Lessons</button>
    `;
  } else if (lpSheetView === "chapter"){
    const c = lpGet();
    const label = c ? ("Chapter 1: " + c.title) : "Chapter 1";
    body = sheetTopBar("Chapter", { back:"chapterSelect" }) + `<div class="sheet-list">${sheetRow(label, "", "set-chapter:" + label)}</div>`;
  } else if (lpSheetView === "lessons"){
    const c = lpGet();
    const days = c ? c.days : [];
    body = sheetTopBar("Lesson", { back:"chapterSelect" }) + `
      <div class="sheet-list">
        <div class="sheet-row" data-lp="pick-lesson:Full Chapter"><span class="text-[14px] font-semibold" style="color:#fff;">Full Chapter<br><span style="font-size:11px; color:#98989D; font-weight:400;">All ${days.length} lessons</span></span><span style="color:#25D366;">✓</span></div>
        ${days.map(x => `<div class="sheet-row" data-lp="pick-lesson:${x.d}"><span class="text-[14px] font-semibold" style="color:#fff;">${x.d}<br><span style="font-size:11px; color:#98989D; font-weight:400;">${x.topic} · p.${x.pages}</span></span></div>`).join("")}
      </div>`;
  }

  el.innerHTML = `<div class="sheet-overlay"><div class="sheet-panel fade-up">${body}</div></div>`;
}

document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-lp]");
  if (!t) return;
  const action = t.getAttribute("data-lp");
  if (!action) return;
  if (action === "close"){ closeLpSheet(); return; }
  if (action === "browse" || action === "chapterSelect"){ openLpSheet(action); return; }
  if (action === "to-chapter"){ openLpSheet("chapterSelect"); return; }
  if (action === "to-lessons"){ openLpSheet("lessons"); return; }
  if (action === "open-grade"){ openLpSheet("grade"); return; }
  if (action === "open-subject"){ openLpSheet("subject"); return; }
  if (action === "open-chapter"){ openLpSheet("chapter"); return; }
  if (action.startsWith("set-grade:")){ lpSel.grade = action.split(":")[1]; openLpSheet("browse"); return; }
  if (action.startsWith("set-subject:")){ lpSel.subject = action.split(":")[1]; lpSel.chapter = null; openLpSheet("browse"); return; }
  if (action.startsWith("set-chapter:")){ lpSel.chapter = action.split(":").slice(1).join(":"); openLpSheet("chapterSelect"); return; }
  if (action.startsWith("pick-lesson:")){
    const day = action.split(":")[1];
    closeLpSheet();
    runLessonPlanFlow(day);
    return;
  }
});

function runLessonPlanFlow(dayLabel){
  if (lpBusy || lpDone) return;
  lpBusy = true;
  const c = lpGet();
  const day = lpDay(dayLabel);
  const gLabel = lpSel.grade;
  const summary = `${gLabel} · ${lpSel.subject} · ${dayLabel}`;
  const m2 = lpEngine.push({ from:"teacher", kind:"text", time:"12:15 PM", text: summary, read:false });
  lpEngine.markRead(m => m.id === m2.id);
  lpEngine.say({ from:"rumi", kind:"text", time:"12:15 PM", text:"Yahan hai aapka lesson plan 👇" }, 900, () => {
    const cardMsg = { from:"rumi", kind:"card", time:"12:15 PM",
      header: `${dayLabel.toUpperCase()} · ${gLabel.toUpperCase()} ${lpSel.subject.toUpperCase()}`,
      subhead: day ? day.topic : (c ? c.title : lpSel.subject),
      goal: day ? day.goal : (c ? c.title : ""),
      slo: day ? day.slo : "",
      pages: day ? day.pages : "",
      mins: (day && day.dur ? day.dur + " min" : "30 min") };
    lpEngine.say(cardMsg, 900, () => {
      const pdfHref = day && day.pdf ? ("https://drive.google.com/file/d/" + day.pdf + "/view") : null;
      const sendVoice = () => {
        lpEngine.say({ from:"rumi", kind:"voice", time:"12:16 PM", duration:"1:30", vid:"lpv1", audio: c ? c.audio : null, duration_ms:4000 }, 700, () => {
          lpDone = true; lpBusy = false;
          lpCounter += 1;
          const cnt = document.getElementById("lp-counter");
          if (cnt){ cnt.textContent = lpCounter.toLocaleString(); cnt.classList.add("stat-bump"); }
          const lg = document.getElementById("lp-log");
          if (lg) lg.innerHTML = `<p class="text-xs" style="color:#7BE6B0;">✓ Synced to TaleemHub — ${summary} logged, just now.</p>`;
        });
      };
      if (pdfHref){
        lpEngine.say({ from:"rumi", kind:"docLink", time:"12:15 PM", href: pdfHref, name: `${lpSel.subject} · ${gLabel} · ${dayLabel}`, sub: "Open lesson plan · PDF", color:"#7C3AED" }, 700, sendVoice);
      } else {
        sendVoice();
      }
    });
  });
}

function initPhonicsModule(){
  phonicsEngine = makeEngine("ph-scroll", "student");
  phonicsBusy = false;
  phonicsTask = PHONICS_TASKS[phonicsTaskIdx % PHONICS_TASKS.length];
  phonicsTaskIdx++;
  document.getElementById("ph-scroll").innerHTML = `
    <div class="h-full flex flex-col items-center justify-center text-center px-6">
      <div class="pulse-ring flex items-center justify-center rounded-full mb-4" style="width:54px;height:54px;background:var(--wa-accent);">

      </div>

      <button id="ph-start" class="px-5 py-2.5 rounded-full text-[13px] font-bold" style="background:var(--wa-accent); color:#04201A;">Start the task</button>
    </div>`;
  document.getElementById("ph-start").addEventListener("click", () => {
    document.getElementById("ph-scroll").innerHTML = "";
    setTimeout(() => {
      phonicsEngine.say({ from:"rumi", kind:"image", time:"6:02 PM", src: phonicsTask.img, caption: phonicsTask.caption }, 900, () => {
        phonicsSeq++;
        phonicsEngine.say({ from:"rumi", kind:"voice", time:"6:02 PM", duration:"0:05", vid:"ph-prompt-" + phonicsSeq, audio: phonicsTask.promptAudio, duration_ms:2000 }, 700, () => {
          document.getElementById("ph-actions").innerHTML = phonicsOptionsHtml();
          document.querySelectorAll(".ph-opt").forEach(b => b.addEventListener("click", () => answerPhonics(b.getAttribute("data-ans"))));
        });
      });
    }, 300);
  });
}

function answerPhonics(ans){
  if (phonicsBusy) return;
  phonicsBusy = true;
  document.getElementById("ph-actions").innerHTML = "";
  const m1 = phonicsEngine.push({ from:"student", kind:"text", time:"6:03 PM", text: ans, read:false });
  phonicsEngine.markRead(m => m.id === m1.id);
  const isRight = ans === phonicsTask.correct || (phonicsTask.altCorrect && phonicsTask.altCorrect.includes(ans));
  phonicsSeq++;
  if (isRight){
    phonicsEngine.say({ from:"rumi", kind:"voice", time:"6:03 PM", duration:"0:04", vid:"ph-correct-" + phonicsSeq, audio: phonicsTask.correctAudio, duration_ms:1800 }, 700, () => {
      phonicsEngine.say({ from:"rumi", kind:"text", time:"6:03 PM", text:`Shabash! 🎉 ${phonicsTask.why}` }, 800, () => {
        phonicsStreak += 1;
        phonicsEngine.say({ from:"rumi", kind:"text", time:"6:03 PM", text:`🔥 ${phonicsStreak}-din ka streak mukammal! Kal phir milte hain.` }, 900, () => {
          const s = document.getElementById("ph-streak");
          if (s){ s.textContent = phonicsStreak + " 🔥"; s.classList.add("stat-bump"); }
          const lg = document.getElementById("ph-log");
          if (lg) lg.innerHTML = `<p class="text-xs" style="color:#7BE6B0;">✓ Task ${phonicsStreak} of 20 complete — streak saved (${phonicsTask.subject} · Grade ${phonicsTask.grade} · ${phonicsTask.title}).</p>`;
          phonicsBusy = false;
        });
      });
    });
  } else {
    phonicsEngine.say({ from:"rumi", kind:"voice", time:"6:03 PM", duration:"0:04", vid:"ph-wrong-" + phonicsSeq, audio: phonicsTask.wrongAudio, duration_ms:1800 }, 700, () => {
      phonicsEngine.say({ from:"rumi", kind:"text", time:"6:03 PM", text:"Koi baat nahi! Phir se socho." }, 900, () => {
        document.getElementById("ph-actions").innerHTML = phonicsOptionsHtml();
        document.querySelectorAll(".ph-opt").forEach(b => b.addEventListener("click", () => { phonicsBusy = false; answerPhonics(b.getAttribute("data-ans")); }));
      });
    });
  }
}
